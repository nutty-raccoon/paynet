  eth-setup:
    image: "eth-setup"
    build:
      context: .
      dockerfile: ./dockerfiles/ethereum-setup.Dockerfile
    command:
      - "--chain-id=1337"
      - "--url=http://eth-devnet:8545"
      - "--private-key=0xb71c71a67e1177ad4e901695e1b4b9ee17ae16c6668d313eac2f96dbcda3f291" #--dev private key
    # This is a one shot service
    restart: "no"
    stdin_open: false
    tty: false
    depends_on:
      eth-devnet:
        condition: service_healthy
        

