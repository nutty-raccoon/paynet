  eth-firehose:
    image: eth-firehose
    build:
      context: .
      dockerfile: ./dockerfiles/ethereum-firehose.Dockerfile
    ports:
      - "10015:10015"
      - "10016:10016"
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=localhost:10001"]
      start_period: 1s
      interval: 3s
      retries: 3

