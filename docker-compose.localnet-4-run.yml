services:
  localnet:
    image: "ghcr.io/streamingfast/go-ethereum:geth-v1.16.1-fh3.0-2"
    entrypoint: [geth]
    command:
      - --networkid=31337
      - --state.scheme=path
      - --verbosity=3
      - --datadir=/execution-data
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.vhosts=*
      - --http.corsdomain=*
      - --http.api=admin,engine,net,eth,web3,debug,txpool
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
      - --ws.api=admin,engine,net,eth,web3,debug,txpool
      - --ws.origins=*
      - --allow-insecure-unlock
      - --nat=extip:${IP_ADDRESS}
      - --authrpc.port=8551
      - --authrpc.addr=0.0.0.0
      - --authrpc.vhosts=*
      - --authrpc.jwtsecret=/el-cl-genesis-data/jwt/jwtsecret
      - --syncmode=full
      - --rpc.allow-unprotected-txs
      - --metrics
      - --metrics.addr=0.0.0.0
      - --metrics.port=6060
      - --port=30303
      - --discovery.port=30303
      - --miner.gasprice=1
    volumes:
      - ./localnet/execution-data:/execution-data
      - ./localnet/el-cl-genesis-data:/el-cl-genesis-data
    ports:
      - "8545:8545" 
      - "8546:8546" 
      - "8551:8551" 
      - "6060:6060" 
      - "30303:30303/tcp"
      - "30303:30303/udp"
    restart: unless-stopped

  localnet-beacon:
    image: sigp/lighthouse:latest
    command:
      - lighthouse
      - beacon_node
      - --debug-level=info
      - --datadir=/consensus-data
      - --testnet-dir=/el-cl-genesis-data/metadata
      - --disable-enr-auto-update
      - --enr-address=${IP_ADDRESS}
      - --enr-udp-port=9000
      - --enr-tcp-port=9000
      - --enr-quic-port=9001
      - --quic-port=9001
      - --listen-address=0.0.0.0
      - --port=9000
      - --http
      - --http-address=0.0.0.0
      - --http-port=5052
      - --http-allow-origin=*
      - --execution-endpoints=http://localnet:8551
      - --jwt-secrets=/el-cl-genesis-data/jwt/jwtsecret
      - --suggested-fee-recipient=0xf97e180c050e5Ab072211Ad2C213Eb5AEE4DF134
      - --subscribe-all-subnets
      - --import-all-attestations
      - --metrics
      - --metrics-address=0.0.0.0
      - --metrics-allow-origin=*
      - --metrics-port=5054
      - --disable-packet-filter
      - --disable-peer-scoring
      - --allow-insecure-genesis-sync
      - --enable-private-discovery
      - --validator-monitor-auto
    volumes:
      - ./localnet/consensus-data:/consensus-data 
      - ./localnet/el-cl-genesis-data:/el-cl-genesis-data
    ports:
      - "9000:9000/tcp"
      - "9000:9000/udp"
      - "9001:9001/udp"
      - "5052:5052"
      - "5054:5054"
    depends_on:
      - localnet
    restart: unless-stopped

  localnet-validator:
    image: sigp/lighthouse:latest
    command:
      - lighthouse
      - validator_client
      - --debug-level=info
      - --testnet-dir=/el-cl-genesis-data/metadata
      - --validators-dir=/validator_keys
      - --secrets-dir=/validator_keys_secrets
      - --http
      - --http-address=0.0.0.0
      - --http-port=5062
      - --unencrypted-http-transport
      - --init-slashing-protection
      - --beacon-nodes=http://localnet-beacon:5052
      - --suggested-fee-recipient=0xf97e180c050e5Ab072211Ad2C213Eb5AEE4DF134
      - --metrics
      - --metrics-address=0.0.0.0
      - --metrics-allow-origin=*
      - --metrics-port=5064
      - --broadcast=attestations,blocks,subscriptions
    volumes:
      - ./localnet/el-cl-genesis-data:/el-cl-genesis-data
      - ./localnet/validator_keys:/validator_keys
      - ./localnet/validator_keys_secrets:/validator_keys_secrets
    ports:
      - "5062:5062"
      - "5064:5064"
    depends_on:
      - localnet-beacon
    restart: unless-stopped